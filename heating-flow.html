<!DOCTYPE html>
<html>
<head>
  <title>Heating Flow Rate Calculator - MEPkit</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #1f1f1f;
      color: white;
      margin: 0;
      padding: 60px 20px;
      text-align: center;
    }

    .container {
      max-width: 520px;
      margin: 0 auto;
    }

    img {
      margin-bottom: 24px;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 12px;
    }

    p {
      color: #d4d4d4;
      margin-bottom: 32px;
    }

    .card {
      background: #2a2a2a;
      border-radius: 12px;
      padding: 28px;
      text-align: left;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 15px;
      color: #e5e5e5;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 20px;
      border: 1px solid #444;
      border-radius: 8px;
      background: #181818;
      color: white;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 14px;
      background: white;
      color: black;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    .result {
      margin-top: 24px;
      padding: 18px;
      background: #181818;
      border-radius: 10px;
      font-size: 20px;
      font-weight: bold;
      text-align: center;
    }

    .back {
      display: inline-block;
      margin-top: 28px;
      color: white;
      text-decoration: none;
      opacity: 0.8;
    }

    .back:hover {
      opacity: 1;
    }

    .formula {
      margin-top: 20px;
      color: #bdbdbd;
      font-size: 14px;
      line-height: 1.6;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="MEPkitlogo.png" width="180">

    <h1>Heating Flow Rate Calculator</h1>
    <p>Calculate LTHW flow rate from heat load and temperature difference.</p>

    <div class="card">
      <label for="load">Heat Load (kW)</label>
      <input type="number" id="load" placeholder="e.g. 50">

      <label for="deltaT">Delta T (°C)</label>
      <input type="number" id="deltaT" placeholder="e.g. 11">

      <button onclick="calculateFlow()">Calculate</button>

      <div class="result" id="result">
        Flow Rate = -
      </div>

      <div class="formula">
        Formula: Flow Rate (L/s) = Heat Load (kW) ÷ (4.18 × ΔT)
      </div>
    </div>

    <a class="back" href="index.html">← Back to homepage</a>
  </div>

  <script>
    function calculateFlow() {
      const load = parseFloat(document.getElementById('load').value);
      const deltaT = parseFloat(document.getElementById('deltaT').value);
      const resultBox = document.getElementById('result');

      if (isNaN(load) || isNaN(deltaT) || deltaT === 0) {
        resultBox.innerHTML = 'Please enter valid numbers';
        return;
      }

      const flow = load / (4.18 * deltaT);
      resultBox.innerHTML = 'Flow Rate = ' + flow.toFixed(2) + ' L/s';
    }
  </script>
</body>
</html>
